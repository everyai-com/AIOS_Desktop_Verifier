# Drop this into .github/workflows/verify-release.yml in your verifier repo
# (e.g. everyai-com/AIOS_Desktop_Verifier).
#
# Required secrets:
#   AIOS_REPO_TOKEN — fine-grained PAT with `Contents: read` + `Issues: write` on AIOS_Desktop
#
# Triggers:
#   - repository_dispatch from AIOS_Desktop on release: published
#   - manual workflow_dispatch for re-runs

name: Verify Release

on:
  repository_dispatch:
    types: [aios-release]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify (e.g. v0.2.24)
        required: true
        type: string

concurrency:
  group: verify-${{ github.event.client_payload.tag || inputs.tag }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
          - os: windows-latest
            platform: win32
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.client_payload.tag || inputs.tag }}"
          if [ -z "$TAG" ]; then echo "::error::No tag provided"; exit 1; fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Playwright deps
        run: npx playwright install chromium

      - name: Run probes
        env:
          GITHUB_TOKEN: ${{ secrets.AIOS_REPO_TOKEN }}
        run: npx tsx run-local.ts --tag ${{ steps.tag.outputs.value }} --platform ${{ matrix.platform }} --owner everyai-com --repo AIOS_Desktop-releases --reports-dir ${{ github.workspace }}/verification-reports

      - name: Collect probe evidence (traces, screenshots, logs)
        if: always()
        shell: bash
        run: |
          mkdir -p evidence
          # Probes write trace.zip / failure.png / *.log to temp logDir;
          # also pull the verification-reports markdown.
          cp -R ${{ github.workspace }}/verification-reports evidence/ 2>/dev/null || true
          find $TMPDIR /tmp /var/folders -path "*verifier-*" -name "trace.zip" 2>/dev/null \
            -exec sh -c 'cp "$1" evidence/$(basename $(dirname $1))-trace.zip' _ {} \; || true
          find $TMPDIR /tmp /var/folders -path "*verifier-*" -name "failure.png" 2>/dev/null \
            -exec sh -c 'cp "$1" evidence/$(basename $(dirname $1))-failure.png' _ {} \; || true
          find $TMPDIR /tmp /var/folders -path "*verifier-*" -name "*.log" 2>/dev/null \
            -exec sh -c 'cp "$1" evidence/$(basename $(dirname $(dirname $1)))-$(basename $1)' _ {} \; || true
          ls -la evidence/ || true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-evidence-${{ matrix.platform }}-${{ steps.tag.outputs.value }}
          path: evidence/
          if-no-files-found: warn

      - name: Post report to AIOS_Desktop issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.AIOS_REPO_TOKEN }}
        shell: bash
        run: |
          REPORT="${{ github.workspace }}/verification-reports/${{ steps.tag.outputs.value }}-${{ matrix.platform }}.md"
          if [ -f "$REPORT" ]; then
            gh issue list --repo everyai-com/AIOS_Desktop --search "Verification: ${{ steps.tag.outputs.value }}" --json number --jq '.[0].number' > issue.txt || true
            ISSUE=$(cat issue.txt)
            if [ -z "$ISSUE" ]; then
              ISSUE=$(gh issue create --repo everyai-com/AIOS_Desktop --title "Verification: ${{ steps.tag.outputs.value }}" --body "Auto-generated verification thread for release ${{ steps.tag.outputs.value }}." --label verification | tail -1 | sed 's|.*/||')
            fi
            gh issue comment "$ISSUE" --repo everyai-com/AIOS_Desktop --body-file "$REPORT"
          fi
